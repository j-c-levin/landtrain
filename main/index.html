<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Land Train — First Journey</title>
    <link rel="icon" href="data:," />
    <script type="module" crossorigin src="/landtrain/main/assets/index-D3ItMvwr.js"></script>
    <link rel="stylesheet" crossorigin href="/landtrain/main/assets/index-DTUkJsKE.css">
  </head>
  <body>
    <canvas id="scene"></canvas>

    <!-- atmosphere overlays -->
    <div id="vignette"></div>
    <div id="grain"></div>

    <!-- HUD -->
    <div id="hud">
      <div id="gauges">
        <div class="gauge" id="gauge-engine" title="Engine efficiency">
          <span class="gauge-icon">&#9832;</span>
          <span class="gauge-track"><span class="gauge-fill"></span></span>
        </div>
        <div class="gauge" id="gauge-tread" title="Tread condition">
          <span class="gauge-icon">&#9881;</span>
          <span class="gauge-track"><span class="gauge-fill"></span></span>
        </div>
      </div>

      <div id="map-help">
        <span><b>Click</b> lay waypoint</span>
        <span><b>Z</b> undo</span>
        <span><b>C</b> clear</span>
        <span><b>Drag / scroll</b> pan &amp; zoom</span>
        <span><b>E</b> leave the cab</span>
      </div>

      <div id="toast"></div>

      <div id="prompt">
        <span id="prompt-key">E</span>
        <span id="prompt-text"></span>
        <span id="prompt-bar"><span id="prompt-bar-fill"></span></span>
      </div>

      <div id="reading-line">&hellip; the plains roll by, page after page &hellip;</div>

      <!-- clear touch targets for getting in/out of the resting & map views -->
      <div id="view-buttons">
        <button id="btn-undo" type="button">undo</button>
        <button id="btn-clear" type="button">clear</button>
        <button id="btn-orbit" type="button">orbit</button>
        <button id="btn-exit" type="button">exit</button>
      </div>

      <div id="mute-hint"><b>M</b> sound</div>

      <div id="edge-markers">
        <div class="edge-marker" id="marker-tree" hidden>
          <span class="edge-arrow"></span>
          <svg class="edge-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2c3 0 5 2.4 5 5.2 0 1-.3 1.9-.8 2.6 1.4.6 2.3 2 2.3 3.6 0 2.2-1.9 4-4.2 4H9.7C7.4 17.4 5.5 15.6 5.5 13.4c0-1.6.9-3 2.3-3.6-.5-.7-.8-1.6-.8-2.6C7 4.4 9 2 12 2z" fill="#8a9a6b"/>
            <rect x="11" y="15" width="2" height="7" rx="1" fill="#6b5640"/>
          </svg>
        </div>
        <div class="edge-marker" id="marker-train" hidden>
          <span class="edge-arrow"></span>
          <svg class="edge-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="7" width="13" height="8" rx="1.5" fill="#b5573c"/>
            <rect x="14" y="4" width="5" height="6" rx="1" fill="#c9913e"/>
            <circle cx="8" cy="17" r="2" fill="#3d2f28"/>
            <circle cx="14" cy="17" r="2" fill="#3d2f28"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- cards -->
    <div id="card" class="hidden">
      <div id="card-inner"></div>
    </div>

    <div id="update-banner">
      <span>A new version of the train has arrived — refresh to board it.</span>
      <button id="update-banner-refresh" type="button">Refresh</button>
    </div>

  </body>
</html>
